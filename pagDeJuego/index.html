<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pico Park</title>
  <link rel="stylesheet" href="estilos.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div id="zona-juego">
      <div id="cabecera">
        <span id="titulo">Pico Park</span>
        <span id="contador-jugadores">Jugadores: 0/4</span>
        <span id="estado-conexion">🔴 Desconectado</span>
      </div>

      <canvas id="canvas"></canvas>
    </div>

    <div id="panel-lateral">
      <div id="panel-titulo">📱 Unirse</div>
      <div id="info-ip">Cargando…</div>
      <div id="qr-imagen"></div>
      <div id="panel-instrucciones">
        <p>Abrí la app y</p>
        <p>escaneá el código QR</p>
        <hr/>
        <p id="texto-regla">Con +3 jugadores aparece la llave 🗝️</p>
      </div>
    </div>

  <script src="juego.js"></script>
</body>
</html>
